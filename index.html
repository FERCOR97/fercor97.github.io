<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pablo Armijos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --hyrule-dark: #0a0f0d;
            --hyrule-green: #2d5a3d;
            --hyrule-gold: #c9a227;
            --hyrule-light-gold: #e8d59a;
            --hyrule-mist: #4a6b5a;
            --hyrule-ancient: #1a2a22;
        }

        body {
            min-height: 100vh;
            background: var(--hyrule-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cormorant Garamond', serif;
            overflow: hidden;
            position: relative;
        }

        .particles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; overflow: hidden;
        }

        .particle {
            position: absolute; width: 4px; height: 4px;
            background: var(--hyrule-gold); border-radius: 50%; opacity: 0;
            animation: float-particle 8s infinite ease-in-out;
            box-shadow: 0 0 10px var(--hyrule-gold), 0 0 20px var(--hyrule-gold);
        }

        @keyframes float-particle {
            0%, 100% { opacity: 0; transform: translateY(100vh) scale(0); }
            10% { opacity: 0.8; } 90% { opacity: 0.8; }
            100% { opacity: 0; transform: translateY(-100px) scale(1); }
        }

        .particle:nth-child(1) { left: 10%; animation-delay: 0s; animation-duration: 7s; }
        .particle:nth-child(2) { left: 20%; animation-delay: 1.5s; animation-duration: 9s; }
        .particle:nth-child(3) { left: 30%; animation-delay: 3s; animation-duration: 6s; }
        .particle:nth-child(4) { left: 40%; animation-delay: 0.5s; animation-duration: 8s; }
        .particle:nth-child(5) { left: 50%; animation-delay: 2s; animation-duration: 10s; }
        .particle:nth-child(6) { left: 60%; animation-delay: 4s; animation-duration: 7s; }
        .particle:nth-child(7) { left: 70%; animation-delay: 1s; animation-duration: 9s; }
        .particle:nth-child(8) { left: 80%; animation-delay: 3.5s; animation-duration: 6s; }
        .particle:nth-child(9) { left: 90%; animation-delay: 2.5s; animation-duration: 8s; }
        .particle:nth-child(10) { left: 15%; animation-delay: 5s; animation-duration: 11s; }
        .particle:nth-child(11) { left: 35%; animation-delay: 6s; animation-duration: 7s; }
        .particle:nth-child(12) { left: 55%; animation-delay: 4.5s; animation-duration: 9s; }
        .particle:nth-child(13) { left: 75%; animation-delay: 7s; animation-duration: 8s; }
        .particle:nth-child(14) { left: 85%; animation-delay: 5.5s; animation-duration: 10s; }
        .particle:nth-child(15) { left: 25%; animation-delay: 8s; animation-duration: 6s; }

        .fog {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(45, 90, 61, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(45, 90, 61, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(26, 42, 34, 0.8) 0%, transparent 70%);
            pointer-events: none;
            animation: fog-drift 20s infinite ease-in-out alternate;
        }

        @keyframes fog-drift { 0% { opacity: 0.6; } 100% { opacity: 1; } }

        /* ===== FROG ===== */
        .frog-container {
            position: fixed;
            z-index: 6;
            pointer-events: none;
            transition: none;
            filter: drop-shadow(0 4px 12px rgba(201, 162, 39, 0.25));
        }

        .frog-container svg {
            width: 50px;
            height: 50px;
        }

        /* Main content */
        .container {
            text-align: center; z-index: 10; position: relative;
        }

        .emblem {
            width: 60px; height: 52px; margin: 0 auto 40px;
            position: relative; opacity: 0;
            animation: emblem-appear 2s ease-out 0.5s forwards;
        }

        .emblem::before {
            content: ''; position: absolute; top: 0; left: 50%;
            transform: translateX(-50%); width: 0; height: 0;
            border-left: 30px solid transparent; border-right: 30px solid transparent;
            border-bottom: 52px solid var(--hyrule-gold);
            filter: drop-shadow(0 0 15px rgba(201, 162, 39, 0.5));
        }

        @keyframes emblem-appear {
            0% { opacity: 0; transform: scale(0.5) translateY(-20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .emblem::after {
            content: ''; position: absolute; top: 0; left: 50%;
            transform: translateX(-50%); width: 0; height: 0;
            border-left: 30px solid transparent; border-right: 30px solid transparent;
            border-bottom: 52px solid var(--hyrule-light-gold);
            opacity: 0; animation: emblem-pulse 3s ease-in-out infinite; animation-delay: 2.5s;
        }

        @keyframes emblem-pulse { 0%, 100% { opacity: 0; } 50% { opacity: 0.6; } }

        .name {
            font-family: 'Cinzel', serif;
            font-size: clamp(2rem, 8vw, 4.5rem);
            font-weight: 600; color: var(--hyrule-light-gold);
            letter-spacing: 0.15em; text-transform: uppercase;
            margin-bottom: 50px;
            text-shadow: 0 0 40px rgba(201, 162, 39, 0.3), 0 2px 4px rgba(0, 0, 0, 0.5);
            opacity: 0; animation: text-reveal 1.5s ease-out 1s forwards;
        }

        @keyframes text-reveal {
            0% { opacity: 0; letter-spacing: 0.4em; filter: blur(10px); }
            100% { opacity: 1; letter-spacing: 0.15em; filter: blur(0); }
        }

        @keyframes fade-in {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .separator {
            width: 60px; height: 1px;
            background: linear-gradient(90deg, transparent, var(--hyrule-gold), transparent);
            margin: 0 auto 40px; opacity: 0;
            animation: fade-in 1.5s ease-out 1.5s forwards;
        }

        .nav-links {
            display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;
            opacity: 0; animation: fade-in 1.5s ease-out 1.8s forwards; padding: 0 20px;
        }

        .nav-link {
            position: relative; display: inline-flex; align-items: center;
            justify-content: center; padding: 16px 32px; background: transparent;
            border: 1px solid rgba(201, 162, 39, 0.4); color: var(--hyrule-light-gold);
            font-family: 'Cinzel', serif; font-size: 0.85rem; font-weight: 600;
            letter-spacing: 0.2em; text-transform: uppercase; text-decoration: none;
            cursor: pointer; transition: all 0.4s ease; overflow: hidden;
        }

        .nav-link::before {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(201, 162, 39, 0.1), transparent);
            transition: left 0.5s ease;
        }
        .nav-link:hover::before { left: 100%; }

        .nav-link::after {
            content: ''; position: absolute; inset: 3px;
            border: 1px solid rgba(201, 162, 39, 0.1);
            transition: all 0.4s ease; pointer-events: none;
        }

        .nav-link:hover {
            background: rgba(201, 162, 39, 0.12); border-color: var(--hyrule-gold);
            box-shadow: 0 0 25px rgba(201, 162, 39, 0.15), inset 0 0 25px rgba(201, 162, 39, 0.05);
            transform: translateY(-2px);
        }
        .nav-link:hover::after { border-color: rgba(201, 162, 39, 0.3); }

        .nav-link .diamond {
            font-size: 0.5rem; margin-right: 12px; opacity: 0.6;
            transition: opacity 0.4s ease;
        }
        .nav-link:hover .diamond { opacity: 1; text-shadow: 0 0 8px var(--hyrule-gold); }

        .contact-btn {
            position: fixed; top: 30px; left: 30px; z-index: 100;
            background: transparent; border: 1px solid var(--hyrule-gold);
            color: var(--hyrule-light-gold); font-family: 'Cinzel', serif;
            font-size: 0.85rem; letter-spacing: 0.15em; padding: 12px 24px;
            cursor: pointer; opacity: 0; animation: fade-in 1s ease-out 2.5s forwards;
            transition: all 0.3s ease; text-decoration: none;
        }
        .contact-btn:hover {
            background: var(--hyrule-gold); color: var(--hyrule-dark);
            box-shadow: 0 0 20px rgba(201, 162, 39, 0.4);
        }
        .contact-btn::before {
            content: '◆'; margin-right: 10px; font-size: 0.6rem; vertical-align: middle;
        }

        .corner {
            position: fixed; width: 80px; height: 80px;
            border-color: var(--hyrule-gold); border-style: solid;
            opacity: 0; animation: corner-appear 1s ease-out 2.5s forwards;
        }
        .corner--tl { top: 100px; left: 30px; border-width: 2px 0 0 2px; }
        .corner--tr { top: 30px; right: 30px; border-width: 2px 2px 0 0; }
        .corner--bl { bottom: 30px; left: 30px; border-width: 0 0 2px 2px; }
        .corner--br { bottom: 30px; right: 30px; border-width: 0 2px 2px 0; }

        @keyframes corner-appear {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 0.4; transform: scale(1); }
        }
        .corner::after {
            content: '◆'; position: absolute; font-size: 8px; color: var(--hyrule-gold);
        }
        .corner--tl::after { top: -4px; left: -4px; }
        .corner--tr::after { top: -4px; right: -4px; }
        .corner--bl::after { bottom: -4px; left: -4px; }
        .corner--br::after { bottom: -4px; right: -4px; }

        @media (max-width: 600px) {
            .corner { width: 50px; height: 50px; }
            .corner--tl, .corner--tr { top: 20px; }
            .corner--bl, .corner--br { bottom: 20px; }
            .corner--tl, .corner--bl { left: 20px; }
            .corner--tr, .corner--br { right: 20px; }
            .emblem { width: 40px; height: 35px; margin-bottom: 30px; }
            .emblem::before, .emblem::after {
                border-left-width: 20px; border-right-width: 20px; border-bottom-width: 35px;
            }
            .nav-links { flex-direction: column; align-items: center; gap: 14px; }
            .nav-link { width: 240px; padding: 14px 24px; font-size: 0.75rem; }
            .name { margin-bottom: 35px; }
            .separator { margin-bottom: 30px; }
        }
    </style>
</head>
<body>
    <div class="particles">
        <div class="particle"></div><div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    </div>

    <div class="fog"></div>

    <!-- THE FROG -->
    <div class="frog-container" id="frog">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="frogBody" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#d4a832" />
                    <stop offset="50%" style="stop-color:#c9a227" />
                    <stop offset="100%" style="stop-color:#a8871d" />
                </linearGradient>
                <linearGradient id="frogBelly" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#e8d59a" />
                    <stop offset="100%" style="stop-color:#d4b84a" />
                </linearGradient>
                <radialGradient id="eyeShine">
                    <stop offset="0%" style="stop-color:#fff;stop-opacity:0.9" />
                    <stop offset="100%" style="stop-color:#fff;stop-opacity:0" />
                </radialGradient>
            </defs>

            <!-- Shadow -->
            <ellipse cx="50" cy="88" rx="22" ry="5" fill="rgba(0,0,0,0.25)" />

            <!-- Back legs -->
            <ellipse cx="28" cy="78" rx="12" ry="7" fill="#b8941f" transform="rotate(-15, 28, 78)" />
            <ellipse cx="72" cy="78" rx="12" ry="7" fill="#b8941f" transform="rotate(15, 72, 78)" />
            <!-- Back feet -->
            <ellipse cx="18" cy="83" rx="8" ry="4" fill="#a8871d" />
            <ellipse cx="82" cy="83" rx="8" ry="4" fill="#a8871d" />
            <!-- Toe lines -->
            <line x1="12" y1="82" x2="10" y2="80" stroke="#8a6d15" stroke-width="0.8" opacity="0.5" />
            <line x1="16" y1="81" x2="14" y2="78" stroke="#8a6d15" stroke-width="0.8" opacity="0.5" />
            <line x1="84" y1="81" x2="86" y2="78" stroke="#8a6d15" stroke-width="0.8" opacity="0.5" />
            <line x1="88" y1="82" x2="90" y2="80" stroke="#8a6d15" stroke-width="0.8" opacity="0.5" />

            <!-- Body -->
            <ellipse cx="50" cy="65" rx="26" ry="22" fill="url(#frogBody)" />

            <!-- Belly -->
            <ellipse cx="50" cy="72" rx="18" ry="12" fill="url(#frogBelly)" opacity="0.5" />

            <!-- Body spots -->
            <circle cx="38" cy="58" r="3" fill="#b8941f" opacity="0.4" />
            <circle cx="60" cy="55" r="2.5" fill="#b8941f" opacity="0.3" />
            <circle cx="45" cy="68" r="2" fill="#b8941f" opacity="0.3" />

            <!-- Front legs -->
            <ellipse cx="32" cy="80" rx="6" ry="4" fill="#c9a227" transform="rotate(-5, 32, 80)" />
            <ellipse cx="68" cy="80" rx="6" ry="4" fill="#c9a227" transform="rotate(5, 68, 80)" />
            <!-- Front feet -->
            <ellipse cx="26" cy="83" rx="5" ry="3" fill="#b8941f" />
            <ellipse cx="74" cy="83" rx="5" ry="3" fill="#b8941f" />

            <!-- Head -->
            <ellipse cx="50" cy="45" rx="24" ry="18" fill="url(#frogBody)" />

            <!-- Smile -->
            <path d="M40 52 Q50 58 60 52" stroke="#8a6d15" stroke-width="1.2" fill="none" opacity="0.5" />

            <!-- Nostrils -->
            <circle cx="44" cy="47" r="1.2" fill="#8a6d15" opacity="0.4" />
            <circle cx="56" cy="47" r="1.2" fill="#8a6d15" opacity="0.4" />

            <!-- Eye bumps -->
            <circle cx="36" cy="34" r="12" fill="#d4a832" />
            <circle cx="64" cy="34" r="12" fill="#d4a832" />

            <!-- Eye whites -->
            <circle cx="36" cy="33" r="9" fill="#f5f0d0" />
            <circle cx="64" cy="33" r="9" fill="#f5f0d0" />

            <!-- Pupils (will be animated with JS) -->
            <circle id="pupilL" cx="37" cy="33" r="5" fill="#1a1a0a" />
            <circle id="pupilR" cx="65" cy="33" r="5" fill="#1a1a0a" />

            <!-- Eye shine -->
            <circle cx="34" cy="30" r="2.5" fill="url(#eyeShine)" />
            <circle cx="62" cy="30" r="2.5" fill="url(#eyeShine)" />

            <!-- Tiny sparkle on body -->
            <circle cx="55" cy="60" r="1" fill="#fff" opacity="0.3">
                <animate attributeName="opacity" dur="3s" repeatCount="indefinite" values="0.3;0.6;0.3" />
            </circle>
        </svg>
    </div>

    <a href="mailto:pfarmijos@gmail.com" class="contact-btn">Contact</a>

    <div class="corner corner--tl"></div>
    <div class="corner corner--tr"></div>
    <div class="corner corner--bl"></div>
    <div class="corner corner--br"></div>

    <div class="container">
        <div class="emblem"></div>
        <h1 class="name">Pablo Armijos</h1>
        <div class="separator"></div>
        <nav class="nav-links">
            <a href="books.html" class="nav-link"><span class="diamond">◆</span> Books</a>
            <a href="movies.html" class="nav-link"><span class="diamond">◆</span> Movies</a>
            <a href="blog.html" class="nav-link"><span class="diamond">◆</span> Thoughts</a>
        </nav>
    </div>

    <script>
        const frog = document.getElementById('frog');
        const pupilL = document.getElementById('pupilL');
        const pupilR = document.getElementById('pupilR');

        let frogX = Math.random() * 80 + 10;
        let frogY = Math.random() * 60 + 20;
        let facingRight = true;
        let isJumping = false;

        // Position frog initially
        frog.style.left = frogX + '%';
        frog.style.top = frogY + '%';
        frog.style.opacity = '0.55';

        // Curious looking around - pupils follow random points
        let lookTarget = { x: 0, y: 0 };
        let currentLook = { x: 0, y: 0 };

        function pickNewLookTarget() {
            lookTarget.x = (Math.random() - 0.5) * 5;
            lookTarget.y = (Math.random() - 0.5) * 4;
        }

        function updateEyes() {
            // Smoothly lerp toward target
            currentLook.x += (lookTarget.x - currentLook.x) * 0.08;
            currentLook.y += (lookTarget.y - currentLook.y) * 0.08;

            pupilL.setAttribute('cx', 37 + currentLook.x);
            pupilL.setAttribute('cy', 33 + currentLook.y);
            pupilR.setAttribute('cx', 65 + currentLook.x);
            pupilR.setAttribute('cy', 33 + currentLook.y);

            requestAnimationFrame(updateEyes);
        }

        updateEyes();

        // Change where the frog looks every 1-3 seconds
        function lookAround() {
            pickNewLookTarget();
            setTimeout(lookAround, 1000 + Math.random() * 2000);
        }
        lookAround();

        // Blink animation
        function blink() {
            const eyeWhites = frog.querySelectorAll('circle[fill="#f5f0d0"]');
            const pupils = [pupilL, pupilR];
            const shines = frog.querySelectorAll('circle[fill="url(#eyeShine)"]');

            // Close eyes
            eyeWhites.forEach(e => { e.setAttribute('ry', '1'); });
            pupils.forEach(p => { p.style.opacity = '0'; });
            shines.forEach(s => { s.style.opacity = '0'; });

            setTimeout(() => {
                // Open eyes
                eyeWhites.forEach(e => { e.setAttribute('ry', '9'); });
                pupils.forEach(p => { p.style.opacity = '1'; });
                shines.forEach(s => { s.style.opacity = '1'; });
            }, 150);

            // Next blink
            setTimeout(blink, 2000 + Math.random() * 4000);
        }
        setTimeout(blink, 3000);

        // Jump to new position
        function jump() {
            if (isJumping) return;
            isJumping = true;

            const newX = Math.random() * 80 + 5;
            const newY = Math.random() * 60 + 15;
            const dx = newX - frogX;

            // Face direction of jump
            if (dx < 0 && facingRight) {
                frog.querySelector('svg').style.transform = 'scaleX(-1)';
                facingRight = false;
            } else if (dx > 0 && !facingRight) {
                frog.querySelector('svg').style.transform = 'scaleX(1)';
                facingRight = true;
            }

            // Prepare to jump - squash
            frog.style.transition = 'transform 0.15s ease-in';
            frog.style.transform = 'scaleY(0.75) scaleX(1.15)';

            setTimeout(() => {
                // Jump arc
                const midX = (frogX + newX) / 2;
                const midY = Math.min(frogY, newY) - 15 - Math.random() * 10;

                // Stretch during jump
                frog.style.transition = 'left 0.4s cubic-bezier(0.2, 0.8, 0.3, 1), top 0.4s cubic-bezier(0.2, 0.8, 0.3, 1), transform 0.1s ease';
                frog.style.transform = 'scaleY(1.2) scaleX(0.85)';

                // First half - go to midpoint (arc up)
                frog.style.transition = 'left 0.25s ease-out, top 0.25s ease-out, transform 0.1s ease';
                frog.style.left = midX + '%';
                frog.style.top = midY + '%';

                setTimeout(() => {
                    // Second half - land
                    frog.style.transition = 'left 0.25s ease-in, top 0.25s ease-in, transform 0.1s ease';
                    frog.style.left = newX + '%';
                    frog.style.top = newY + '%';

                    setTimeout(() => {
                        // Landing squash
                        frog.style.transition = 'transform 0.1s ease';
                        frog.style.transform = 'scaleY(0.8) scaleX(1.15)';

                        setTimeout(() => {
                            // Return to normal
                            frog.style.transition = 'transform 0.3s ease-out';
                            frog.style.transform = 'scaleY(1) scaleX(1)';

                            frogX = newX;
                            frogY = newY;
                            isJumping = false;

                            // Look around after landing
                            pickNewLookTarget();
                        }, 100);
                    }, 250);
                }, 250);
            }, 200);
        }

        // Jump every 3-7 seconds
        function scheduleJump() {
            const delay = 3000 + Math.random() * 4000;
            setTimeout(() => {
                jump();
                scheduleJump();
            }, delay);
        }

        // Start after a small delay
        setTimeout(scheduleJump, 2000);

        // Occasionally do a little head tilt (curious searching behavior)
        function headTilt() {
            if (isJumping) {
                setTimeout(headTilt, 1000);
                return;
            }
            const tilt = (Math.random() - 0.5) * 8;
            frog.style.transition = 'transform 0.4s ease';
            frog.style.transform = `rotate(${tilt}deg)`;

            setTimeout(() => {
                if (!isJumping) {
                    frog.style.transition = 'transform 0.4s ease';
                    frog.style.transform = 'rotate(0deg)';
                }
            }, 800 + Math.random() * 600);

            setTimeout(headTilt, 4000 + Math.random() * 5000);
        }
        setTimeout(headTilt, 5000);
    </script>
</body>
</html>
