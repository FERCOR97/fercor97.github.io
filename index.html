<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pablo Armijos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --hyrule-dark: #0a0f0d;
            --hyrule-green: #2d5a3d;
            --hyrule-gold: #c9a227;
            --hyrule-light-gold: #e8d59a;
            --hyrule-mist: #4a6b5a;
            --hyrule-ancient: #1a2a22;
        }

        body {
            min-height: 100vh;
            background: var(--hyrule-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cormorant Garamond', serif;
            overflow: hidden;
            position: relative;
        }

        .particles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; overflow: hidden;
        }
        .particle {
            position: absolute; width: 4px; height: 4px;
            background: var(--hyrule-gold); border-radius: 50%; opacity: 0;
            animation: float-particle 8s infinite ease-in-out;
            box-shadow: 0 0 10px var(--hyrule-gold), 0 0 20px var(--hyrule-gold);
        }
        @keyframes float-particle {
            0%, 100% { opacity: 0; transform: translateY(100vh) scale(0); }
            10% { opacity: 0.8; } 90% { opacity: 0.8; }
            100% { opacity: 0; transform: translateY(-100px) scale(1); }
        }
        .particle:nth-child(1) { left: 10%; animation-delay: 0s; animation-duration: 7s; }
        .particle:nth-child(2) { left: 20%; animation-delay: 1.5s; animation-duration: 9s; }
        .particle:nth-child(3) { left: 30%; animation-delay: 3s; animation-duration: 6s; }
        .particle:nth-child(4) { left: 40%; animation-delay: 0.5s; animation-duration: 8s; }
        .particle:nth-child(5) { left: 50%; animation-delay: 2s; animation-duration: 10s; }
        .particle:nth-child(6) { left: 60%; animation-delay: 4s; animation-duration: 7s; }
        .particle:nth-child(7) { left: 70%; animation-delay: 1s; animation-duration: 9s; }
        .particle:nth-child(8) { left: 80%; animation-delay: 3.5s; animation-duration: 6s; }
        .particle:nth-child(9) { left: 90%; animation-delay: 2.5s; animation-duration: 8s; }
        .particle:nth-child(10) { left: 15%; animation-delay: 5s; animation-duration: 11s; }
        .particle:nth-child(11) { left: 35%; animation-delay: 6s; animation-duration: 7s; }
        .particle:nth-child(12) { left: 55%; animation-delay: 4.5s; animation-duration: 9s; }
        .particle:nth-child(13) { left: 75%; animation-delay: 7s; animation-duration: 8s; }
        .particle:nth-child(14) { left: 85%; animation-delay: 5.5s; animation-duration: 10s; }
        .particle:nth-child(15) { left: 25%; animation-delay: 8s; animation-duration: 6s; }

        .fog {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background:
                radial-gradient(ellipse at 20% 80%, rgba(45, 90, 61, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(45, 90, 61, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(26, 42, 34, 0.8) 0%, transparent 70%);
            pointer-events: none;
            animation: fog-drift 20s infinite ease-in-out alternate;
        }
        @keyframes fog-drift { 0% { opacity: 0.6; } 100% { opacity: 1; } }

        /* FROG */
        #frogCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 6;
            pointer-events: none;
        }

        /* Main content */
        .container { text-align: center; z-index: 10; position: relative; }

        .emblem {
            width: 60px; height: 52px; margin: 0 auto 40px;
            position: relative; opacity: 0;
            animation: emblem-appear 2s ease-out 0.5s forwards;
        }
        .emblem::before {
            content: ''; position: absolute; top: 0; left: 50%;
            transform: translateX(-50%); width: 0; height: 0;
            border-left: 30px solid transparent; border-right: 30px solid transparent;
            border-bottom: 52px solid var(--hyrule-gold);
            filter: drop-shadow(0 0 15px rgba(201, 162, 39, 0.5));
        }
        @keyframes emblem-appear {
            0% { opacity: 0; transform: scale(0.5) translateY(-20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .emblem::after {
            content: ''; position: absolute; top: 0; left: 50%;
            transform: translateX(-50%); width: 0; height: 0;
            border-left: 30px solid transparent; border-right: 30px solid transparent;
            border-bottom: 52px solid var(--hyrule-light-gold);
            opacity: 0; animation: emblem-pulse 3s ease-in-out infinite; animation-delay: 2.5s;
        }
        @keyframes emblem-pulse { 0%, 100% { opacity: 0; } 50% { opacity: 0.6; } }

        .name {
            font-family: 'Cinzel', serif;
            font-size: clamp(2rem, 8vw, 4.5rem);
            font-weight: 600; color: var(--hyrule-light-gold);
            letter-spacing: 0.15em; text-transform: uppercase;
            margin-bottom: 50px;
            text-shadow: 0 0 40px rgba(201, 162, 39, 0.3), 0 2px 4px rgba(0, 0, 0, 0.5);
            opacity: 0; animation: text-reveal 1.5s ease-out 1s forwards;
        }
        @keyframes text-reveal {
            0% { opacity: 0; letter-spacing: 0.4em; filter: blur(10px); }
            100% { opacity: 1; letter-spacing: 0.15em; filter: blur(0); }
        }
        @keyframes fade-in {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .separator {
            width: 60px; height: 1px;
            background: linear-gradient(90deg, transparent, var(--hyrule-gold), transparent);
            margin: 0 auto 40px; opacity: 0;
            animation: fade-in 1.5s ease-out 1.5s forwards;
        }

        .nav-links {
            display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;
            opacity: 0; animation: fade-in 1.5s ease-out 1.8s forwards; padding: 0 20px;
        }
        .nav-link {
            position: relative; display: inline-flex; align-items: center;
            justify-content: center; padding: 16px 32px; background: transparent;
            border: 1px solid rgba(201, 162, 39, 0.4); color: var(--hyrule-light-gold);
            font-family: 'Cinzel', serif; font-size: 0.85rem; font-weight: 600;
            letter-spacing: 0.2em; text-transform: uppercase; text-decoration: none;
            cursor: pointer; transition: all 0.4s ease; overflow: hidden;
        }
        .nav-link::before {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(201, 162, 39, 0.1), transparent);
            transition: left 0.5s ease;
        }
        .nav-link:hover::before { left: 100%; }
        .nav-link::after {
            content: ''; position: absolute; inset: 3px;
            border: 1px solid rgba(201, 162, 39, 0.1);
            transition: all 0.4s ease; pointer-events: none;
        }
        .nav-link:hover {
            background: rgba(201, 162, 39, 0.12); border-color: var(--hyrule-gold);
            box-shadow: 0 0 25px rgba(201, 162, 39, 0.15), inset 0 0 25px rgba(201, 162, 39, 0.05);
            transform: translateY(-2px);
        }
        .nav-link:hover::after { border-color: rgba(201, 162, 39, 0.3); }
        .nav-link .diamond {
            font-size: 0.5rem; margin-right: 12px; opacity: 0.6;
            transition: opacity 0.4s ease;
        }
        .nav-link:hover .diamond { opacity: 1; text-shadow: 0 0 8px var(--hyrule-gold); }

        .contact-btn {
            position: fixed; top: 30px; left: 30px; z-index: 100;
            background: transparent; border: 1px solid var(--hyrule-gold);
            color: var(--hyrule-light-gold); font-family: 'Cinzel', serif;
            font-size: 0.85rem; letter-spacing: 0.15em; padding: 12px 24px;
            cursor: pointer; opacity: 0; animation: fade-in 1s ease-out 2.5s forwards;
            transition: all 0.3s ease; text-decoration: none;
        }
        .contact-btn:hover {
            background: var(--hyrule-gold); color: var(--hyrule-dark);
            box-shadow: 0 0 20px rgba(201, 162, 39, 0.4);
        }
        .contact-btn::before {
            content: '◆'; margin-right: 10px; font-size: 0.6rem; vertical-align: middle;
        }

        .corner {
            position: fixed; width: 80px; height: 80px;
            border-color: var(--hyrule-gold); border-style: solid;
            opacity: 0; animation: corner-appear 1s ease-out 2.5s forwards;
        }
        .corner--tl { top: 100px; left: 30px; border-width: 2px 0 0 2px; }
        .corner--tr { top: 30px; right: 30px; border-width: 2px 2px 0 0; }
        .corner--bl { bottom: 30px; left: 30px; border-width: 0 0 2px 2px; }
        .corner--br { bottom: 30px; right: 30px; border-width: 0 2px 2px 0; }
        @keyframes corner-appear {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 0.4; transform: scale(1); }
        }
        .corner::after {
            content: '◆'; position: absolute; font-size: 8px; color: var(--hyrule-gold);
        }
        .corner--tl::after { top: -4px; left: -4px; }
        .corner--tr::after { top: -4px; right: -4px; }
        .corner--bl::after { bottom: -4px; left: -4px; }
        .corner--br::after { bottom: -4px; right: -4px; }

        @media (max-width: 600px) {
            .corner { width: 50px; height: 50px; }
            .corner--tl, .corner--tr { top: 20px; }
            .corner--bl, .corner--br { bottom: 20px; }
            .corner--tl, .corner--bl { left: 20px; }
            .corner--tr, .corner--br { right: 20px; }
            .emblem { width: 40px; height: 35px; margin-bottom: 30px; }
            .emblem::before, .emblem::after {
                border-left-width: 20px; border-right-width: 20px; border-bottom-width: 35px;
            }
            .nav-links { flex-direction: column; align-items: center; gap: 14px; }
            .nav-link { width: 240px; padding: 14px 24px; font-size: 0.75rem; }
            .name { margin-bottom: 35px; }
            .separator { margin-bottom: 30px; }
        }
    </style>
</head>
<body>
    <div class="particles">
        <div class="particle"></div><div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div><div class="particle"></div>
        <div class="particle"></div><div class="particle"></div><div class="particle"></div>
    </div>

    <div class="fog"></div>

    <!-- Frog canvas -->
    <canvas id="frogCanvas"></canvas>

    <a href="contact.html" class="contact-btn">Contact</a>

    <div class="corner corner--tl"></div>
    <div class="corner corner--tr"></div>
    <div class="corner corner--bl"></div>
    <div class="corner corner--br"></div>

    <div class="container">
        <div class="emblem"></div>
        <h1 class="name">Pablo Armijos</h1>
        <div class="separator"></div>
        <nav class="nav-links">
            <a href="books.html" class="nav-link"><span class="diamond">◆</span> Books</a>
            <a href="movies.html" class="nav-link"><span class="diamond">◆</span> Movies</a>
            <a href="blog.html" class="nav-link"><span class="diamond">◆</span> Thoughts</a>
        </nav>
    </div>

    <script>
        // ===== GOLDEN FROG ON CANVAS =====
        const canvas = document.getElementById('frogCanvas');
        const ctx = canvas.getContext('2d');

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // Frog state
        const frog = {
            x: Math.random() * (window.innerWidth - 100) + 50,
            y: Math.random() * (window.innerHeight - 100) + 50,
            targetX: 0,
            targetY: 0,
            size: 48,
            facingRight: true,
            // Jump
            isJumping: false,
            jumpProgress: 0,
            jumpStartX: 0,
            jumpStartY: 0,
            jumpPeakY: 0,
            // Squash & stretch
            scaleX: 1,
            scaleY: 1,
            // Eyes
            pupilOffX: 0,
            pupilOffY: 0,
            pupilTargetX: 0,
            pupilTargetY: 0,
            // Blink
            eyeOpenness: 1,
            isBlinking: false,
            // Idle
            idleTilt: 0,
            idleTiltTarget: 0,
            // Breathing
            breathPhase: 0,
            // State
            state: 'idle', // idle, preparing, jumping, landing
            stateTimer: 2000 + Math.random() * 3000,
            opacity: 1
        };

        function rand(min, max) { return Math.random() * (max - min) + min; }
        function lerp(a, b, t) { return a + (b - a) * t; }

        // Pick new jump target
        function pickTarget() {
            frog.targetX = rand(60, canvas.width - 60);
            frog.targetY = rand(60, canvas.height - 60);
        }

        // Draw the frog
        function drawFrog() {
            ctx.save();
            ctx.translate(frog.x, frog.y);
            ctx.globalAlpha = frog.opacity;

            // Flip if facing left
            const dir = frog.facingRight ? 1 : -1;
            ctx.scale(dir * frog.scaleX, frog.scaleY);

            // Idle tilt
            ctx.rotate(frog.idleTilt * Math.PI / 180);

            const s = frog.size;
            const breath = Math.sin(frog.breathPhase) * 1.5;

            // Shadow
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.beginPath();
            ctx.ellipse(0, s * 0.45, s * 0.45, s * 0.1, 0, 0, Math.PI * 2);
            ctx.fill();

            // Back legs
            ctx.fillStyle = '#b8941f';
            ctx.beginPath();
            ctx.ellipse(-s * 0.4, s * 0.25, s * 0.28, s * 0.13, -0.3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(s * 0.4, s * 0.25, s * 0.28, s * 0.13, 0.3, 0, Math.PI * 2);
            ctx.fill();

            // Back feet
            ctx.fillStyle = '#a8871d';
            ctx.beginPath();
            ctx.ellipse(-s * 0.58, s * 0.32, s * 0.15, s * 0.07, -0.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(s * 0.58, s * 0.32, s * 0.15, s * 0.07, 0.2, 0, Math.PI * 2);
            ctx.fill();

            // Body
            const bodyGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, s * 0.5);
            bodyGrad.addColorStop(0, '#d4a832');
            bodyGrad.addColorStop(0.6, '#c9a227');
            bodyGrad.addColorStop(1, '#a8871d');
            ctx.fillStyle = bodyGrad;
            ctx.beginPath();
            ctx.ellipse(0, s * 0.05, s * 0.42 + breath, s * 0.38 + breath, 0, 0, Math.PI * 2);
            ctx.fill();

            // Belly
            ctx.fillStyle = 'rgba(232, 213, 154, 0.35)';
            ctx.beginPath();
            ctx.ellipse(0, s * 0.15, s * 0.28, s * 0.2, 0, 0, Math.PI * 2);
            ctx.fill();

            // Body spots
            ctx.fillStyle = 'rgba(184, 148, 31, 0.3)';
            ctx.beginPath(); ctx.arc(-s * 0.15, -s * 0.1, s * 0.06, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(s * 0.18, -s * 0.15, s * 0.05, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(s * 0.05, s * 0.1, s * 0.04, 0, Math.PI * 2); ctx.fill();

            // Front legs
            ctx.fillStyle = '#c9a227';
            ctx.beginPath();
            ctx.ellipse(-s * 0.3, s * 0.3, s * 0.12, s * 0.07, -0.1, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(s * 0.3, s * 0.3, s * 0.12, s * 0.07, 0.1, 0, Math.PI * 2);
            ctx.fill();

            // Front feet
            ctx.fillStyle = '#b8941f';
            ctx.beginPath();
            ctx.ellipse(-s * 0.38, s * 0.34, s * 0.09, s * 0.05, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(s * 0.38, s * 0.34, s * 0.09, s * 0.05, 0, 0, Math.PI * 2);
            ctx.fill();

            // Head
            const headGrad = ctx.createRadialGradient(0, -s * 0.25, 0, 0, -s * 0.25, s * 0.5);
            headGrad.addColorStop(0, '#d4a832');
            headGrad.addColorStop(1, '#b89a25');
            ctx.fillStyle = headGrad;
            ctx.beginPath();
            ctx.ellipse(0, -s * 0.25, s * 0.44, s * 0.36, 0, 0, Math.PI * 2);
            ctx.fill();

            // Smile (wider for bigger face)
            ctx.strokeStyle = 'rgba(138, 109, 21, 0.45)';
            ctx.lineWidth = 1.2;
            ctx.beginPath();
            ctx.arc(0, -s * 0.15, s * 0.22, 0.2, Math.PI - 0.2);
            ctx.stroke();

            // Nostrils
            ctx.fillStyle = 'rgba(138, 109, 21, 0.35)';
            ctx.beginPath(); ctx.arc(-s * 0.1, -s * 0.22, s * 0.03, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(s * 0.1, -s * 0.22, s * 0.03, 0, Math.PI * 2); ctx.fill();

            // Eye bumps (bigger)
            ctx.fillStyle = '#d4a832';
            ctx.beginPath(); ctx.arc(-s * 0.24, -s * 0.48, s * 0.22, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(s * 0.24, -s * 0.48, s * 0.22, 0, Math.PI * 2); ctx.fill();

            // Eye whites (bigger)
            const eyeH = s * 0.18 * frog.eyeOpenness;
            ctx.fillStyle = '#f5f0d0';
            ctx.beginPath();
            ctx.ellipse(-s * 0.24, -s * 0.49, s * 0.17, eyeH, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(s * 0.24, -s * 0.49, s * 0.17, eyeH, 0, 0, Math.PI * 2);
            ctx.fill();

            // Pupils (bigger)
            if (frog.eyeOpenness > 0.3) {
                ctx.fillStyle = '#1a1a0a';
                const ps = s * 0.11;
                ctx.beginPath();
                ctx.arc(-s * 0.24 + frog.pupilOffX * s * 0.07, -s * 0.49 + frog.pupilOffY * s * 0.05, ps, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(s * 0.24 + frog.pupilOffX * s * 0.07, -s * 0.49 + frog.pupilOffY * s * 0.05, ps, 0, Math.PI * 2);
                ctx.fill();

                // Eye shine
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.beginPath();
                ctx.arc(-s * 0.28, -s * 0.53, s * 0.055, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(s * 0.2, -s * 0.53, s * 0.055, 0, Math.PI * 2);
                ctx.fill();
            }

            // Golden glow
            ctx.shadowColor = 'rgba(201, 162, 39, 0.15)';
            ctx.shadowBlur = 20;

            ctx.restore();
        }

        // Animation timers
        let lastTime = 0;
        let lookTimer = 0;
        let blinkTimer = 2000 + rand(1000, 3000);
        let jumpTimer = 2000 + rand(2000, 4000);
        let tiltTimer = 4000 + rand(2000, 4000);

        function update(dt) {
            // Breathing
            frog.breathPhase += dt * 0.002;

            // Smooth eye movement
            frog.pupilOffX = lerp(frog.pupilOffX, frog.pupilTargetX, 0.06);
            frog.pupilOffY = lerp(frog.pupilOffY, frog.pupilTargetY, 0.06);

            // Smooth tilt
            frog.idleTilt = lerp(frog.idleTilt, frog.idleTiltTarget, 0.05);

            // Look around timer
            lookTimer -= dt;
            if (lookTimer <= 0) {
                frog.pupilTargetX = rand(-1, 1);
                frog.pupilTargetY = rand(-0.8, 0.8);
                lookTimer = rand(800, 2500);
            }

            // Blink timer
            blinkTimer -= dt;
            if (blinkTimer <= 0 && !frog.isBlinking) {
                frog.isBlinking = true;
                frog.eyeOpenness = 0.05;
                setTimeout(() => {
                    frog.eyeOpenness = 1;
                    frog.isBlinking = false;
                }, 150);
                blinkTimer = rand(2000, 5000);
            }

            // Tilt timer (curious head tilts when idle)
            tiltTimer -= dt;
            if (tiltTimer <= 0 && frog.state === 'idle') {
                frog.idleTiltTarget = rand(-6, 6);
                setTimeout(() => { frog.idleTiltTarget = 0; }, rand(600, 1200));
                tiltTimer = rand(3000, 6000);
            }

            // Jump timer
            jumpTimer -= dt;
            if (jumpTimer <= 0 && frog.state === 'idle') {
                // Start jump sequence
                pickTarget();
                frog.facingRight = frog.targetX > frog.x;
                frog.state = 'preparing';
                frog.jumpStartX = frog.x;
                frog.jumpStartY = frog.y;
                frog.jumpProgress = 0;

                // Calculate peak (higher arc for longer jumps)
                const dist = Math.abs(frog.targetX - frog.x) + Math.abs(frog.targetY - frog.y);
                frog.jumpPeakY = Math.min(frog.jumpStartY, frog.targetY) - dist * 0.2 - rand(30, 80);

                jumpTimer = rand(3000, 7000);
            }

            // Jump state machine
            if (frog.state === 'preparing') {
                // Squash down before jumping
                frog.scaleX = lerp(frog.scaleX, 1.2, 0.15);
                frog.scaleY = lerp(frog.scaleY, 0.7, 0.15);
                frog.jumpProgress += dt * 0.004;
                if (frog.jumpProgress >= 1) {
                    frog.state = 'jumping';
                    frog.jumpProgress = 0;
                }
            } else if (frog.state === 'jumping') {
                frog.jumpProgress += dt * 0.0025;
                if (frog.jumpProgress > 1) frog.jumpProgress = 1;

                // Smooth jump curve
                const t = frog.jumpProgress;
                const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

                // Position along arc
                frog.x = lerp(frog.jumpStartX, frog.targetX, ease);

                // Parabolic arc for Y
                const arcT = t;
                const arcY = frog.jumpStartY * (1 - arcT) * (1 - arcT)
                    + frog.jumpPeakY * 2 * (1 - arcT) * arcT
                    + frog.targetY * arcT * arcT;
                frog.y = arcY;

                // Stretch during jump
                frog.scaleX = lerp(frog.scaleX, 0.85, 0.1);
                frog.scaleY = lerp(frog.scaleY, 1.2, 0.1);

                if (frog.jumpProgress >= 1) {
                    frog.state = 'landing';
                    frog.jumpProgress = 0;
                }
            } else if (frog.state === 'landing') {
                // Squash on landing
                frog.scaleX = lerp(frog.scaleX, 1.2, 0.2);
                frog.scaleY = lerp(frog.scaleY, 0.75, 0.2);
                frog.jumpProgress += dt * 0.005;
                if (frog.jumpProgress >= 1) {
                    frog.state = 'idle';
                    // Look around after landing
                    frog.pupilTargetX = rand(-1, 1);
                    frog.pupilTargetY = rand(-0.8, 0.8);
                }
            } else {
                // Idle - return to normal scale
                frog.scaleX = lerp(frog.scaleX, 1, 0.08);
                frog.scaleY = lerp(frog.scaleY, 1, 0.08);
            }
        }

        function loop(timestamp) {
            const dt = lastTime ? timestamp - lastTime : 16;
            lastTime = timestamp;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            update(dt);
            drawFrog();

            requestAnimationFrame(loop);
        }

        requestAnimationFrame(loop);
    </script>
</body>
</html>
