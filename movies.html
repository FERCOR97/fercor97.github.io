<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies — Pablo Armijos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --hyrule-dark: #0a0f0d;
            --hyrule-gold: #c9a227;
            --hyrule-light-gold: #e8d59a;
            --hyrule-mist: #4a6b5a;
        }
        body {
            min-height: 100vh;
            background: var(--hyrule-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cormorant Garamond', serif;
            overflow: hidden;
            position: relative;
        }
        .fog {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background:
                radial-gradient(ellipse at 20% 80%, rgba(45, 90, 61, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(45, 90, 61, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(26, 42, 34, 0.8) 0%, transparent 70%);
            pointer-events: none;
        }
        .container {
            text-align: center; z-index: 10; position: relative; padding: 40px 20px;
        }
        .rune {
            font-size: 2.5rem; color: var(--hyrule-gold); margin-bottom: 30px;
            opacity: 0; animation: fade-in 2s ease-out 0.3s forwards;
            filter: drop-shadow(0 0 15px rgba(201, 162, 39, 0.4));
        }
        .title {
            font-family: 'Cinzel', serif;
            font-size: clamp(1.2rem, 5vw, 2.2rem);
            font-weight: 600; color: var(--hyrule-light-gold);
            letter-spacing: 0.12em; text-transform: uppercase;
            margin-bottom: 25px; opacity: 0;
            animation: fade-in 1.5s ease-out 0.8s forwards;
            text-shadow: 0 0 30px rgba(201, 162, 39, 0.3);
        }
        .message {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1rem, 3vw, 1.4rem);
            font-weight: 300; font-style: italic;
            color: var(--hyrule-mist);
            letter-spacing: 0.08em; line-height: 1.8;
            max-width: 500px; margin: 0 auto 40px;
            opacity: 0; animation: fade-in 2s ease-out 1.3s forwards;
        }
        .back-link {
            display: inline-flex; align-items: center;
            padding: 14px 28px; background: transparent;
            border: 1px solid rgba(201, 162, 39, 0.4);
            color: var(--hyrule-light-gold);
            font-family: 'Cinzel', serif; font-size: 0.8rem;
            font-weight: 600; letter-spacing: 0.2em;
            text-transform: uppercase; text-decoration: none;
            cursor: pointer; transition: all 0.4s ease;
            opacity: 0; animation: fade-in 1.5s ease-out 1.8s forwards;
        }
        .back-link:hover {
            background: rgba(201, 162, 39, 0.12);
            border-color: var(--hyrule-gold);
            box-shadow: 0 0 25px rgba(201, 162, 39, 0.15);
            transform: translateY(-2px);
        }
        .back-link .diamond {
            font-size: 0.5rem; margin-right: 10px; opacity: 0.6;
        }
        .back-link:hover .diamond {
            opacity: 1; text-shadow: 0 0 8px var(--hyrule-gold);
        }
        @keyframes fade-in {
            0% { opacity: 0; transform: translateY(12px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .separator {
            width: 40px; height: 1px;
            background: linear-gradient(90deg, transparent, var(--hyrule-gold), transparent);
            margin: 0 auto 25px; opacity: 0;
            animation: fade-in 1.5s ease-out 1.1s forwards;
        }
    </style>
</head>
<body>
    <div class="fog"></div>
    <div class="container">
        <div class="rune">⟡</div>
        <h1 class="title">Movies</h1>
        <div class="separator"></div>
        <p class="message">
            The palantír reveals nothing yet.<br>
            Visions of great stories are being gathered<br>
            but the seeing-stone is not yet ready.
        </p>
        <a href="index.html" class="back-link">
            <span class="diamond">◆</span> Return to the Shire
        </a>
    </div>
</body>
</html>
